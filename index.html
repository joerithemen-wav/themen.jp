<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>THEMEN [TAY.MEN] — テイメン</title>
  <meta name="description" content="THEMEN is a liquid drum & bass producer from Amsterdam.">
  <meta name="theme-color" content="#f2efe7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--paper:#f2efe7;--ink:#151515;--muted:rgba(21,21,21,.58);--line:rgba(21,21,21,.19);--red:#c43a2d;--mx:0;--my:0}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;overflow-x:hidden;background:var(--paper);color:var(--ink);font-family:"Noto Sans JP","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body:before{content:"";position:fixed;inset:0;z-index:20;pointer-events:none;opacity:.2;mix-blend-mode:multiply;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.24'/%3E%3C/svg%3E")}
    a{color:inherit}.page{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto;padding:clamp(22px,3vw,48px);position:relative;isolation:isolate}
    .topbar,.footer{display:flex;justify-content:space-between;align-items:center;gap:20px;position:relative;z-index:4}.mark{display:inline-flex;gap:12px;align-items:center;font-size:11px;letter-spacing:.28em;text-transform:uppercase;text-decoration:none}.mark-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 7px rgba(196,58,45,.08)}.jp-corner{writing-mode:vertical-rl;font-size:13px;letter-spacing:.3em;line-height:1}
    .hero{min-height:72vh;display:grid;place-items:center;padding:9vh 0 5vh;position:relative;perspective:1000px}.hero-inner{width:min(1180px,100%);text-align:center;transform:translate3d(calc(var(--mx)*10px),calc(var(--my)*8px),0) rotateX(calc(var(--my)*-1.2deg)) rotateY(calc(var(--mx)*1.2deg));transition:transform .15s ease-out;transform-style:preserve-3d}.eyebrow{margin:0 0 clamp(18px,3vw,32px);font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--muted)}
    h1{margin:0;font-size:clamp(74px,16.5vw,250px);line-height:.76;letter-spacing:-.075em;font-weight:900;text-transform:uppercase}.kana{margin:clamp(26px,4vw,48px) 0 0;font-size:clamp(18px,2vw,28px);letter-spacing:.28em;font-weight:500}.descriptor{margin:24px auto 0;max-width:600px;font-size:12px;line-height:1.9;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}
    .listen-link{display:inline-flex;align-items:center;gap:14px;margin-top:36px;padding:12px 4px 12px 0;border:0;background:none;color:var(--ink);font:inherit;font-size:12px;letter-spacing:.36em;text-transform:uppercase;cursor:pointer;position:relative}.listen-link:after{content:"";position:absolute;left:0;right:.36em;bottom:2px;height:1px;background:currentColor;transform-origin:left;transition:transform .3s ease}.listen-link:hover:after{transform:scaleX(.35)}.play-symbol{width:38px;height:38px;display:grid;place-items:center;border:1px solid var(--ink);border-radius:50%;letter-spacing:0;transition:background .25s,color .25s,transform .25s}.listen-link:hover .play-symbol{background:var(--ink);color:var(--paper);transform:rotate(4deg)}
    .player{width:min(980px,100%);margin:0 auto 4vh;padding:clamp(18px,2.4vw,30px);border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:18px;align-items:center;position:relative;z-index:4}.player-button{width:52px;height:52px;border-radius:50%;border:1px solid var(--ink);background:transparent;color:var(--ink);font-size:16px;cursor:pointer;transition:.25s ease}.player-button:hover{background:var(--ink);color:var(--paper);transform:scale(1.04)}.track-name{margin:0 0 9px;font-size:13px;letter-spacing:.08em}.progress-wrap{width:100%;height:24px;display:flex;align-items:center;cursor:pointer}.progress{width:100%;height:1px;background:var(--line);position:relative}.progress-fill{width:0;height:100%;background:var(--ink)}.progress-knob{position:absolute;top:50%;left:0;width:8px;height:8px;border-radius:50%;background:var(--red);transform:translate(-50%,-50%)}.time{font-variant-numeric:tabular-nums;font-size:10px;letter-spacing:.08em;color:var(--muted);white-space:nowrap}
    .socials{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 26px;margin-top:22px;grid-column:1/-1}.socials a{position:relative;font-size:10px;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;padding-bottom:4px;color:var(--muted);transition:color .2s ease}.socials a:after{content:"";position:absolute;left:0;bottom:0;width:100%;height:1px;background:var(--ink);transform:scaleX(0);transform-origin:right;transition:transform .25s ease}.socials a:hover{color:var(--ink)}.socials a:hover:after{transform:scaleX(1);transform-origin:left}
    .footer{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}.footer a{text-decoration:none}.stamp{width:29px;height:29px;border:1px solid var(--red);color:var(--red);display:grid;place-items:center;font-size:9px;line-height:1;transform:rotate(-3deg)}
    @media(max-width:700px){.page{padding:22px 18px 26px}.topbar{align-items:flex-start}.hero{min-height:62vh;padding-top:5vh}h1{font-size:clamp(60px,21vw,112px)}.descriptor{letter-spacing:.14em}.player{grid-template-columns:auto minmax(0,1fr);gap:15px}.time{grid-column:2;margin-top:-4px}.socials{gap:12px 18px}.footer{align-items:flex-end}}
    @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.hero-inner{transform:none!important;transition:none}*{animation-duration:.01ms!important}}
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar"><a class="mark" href="#top" aria-label="THEMEN home"><span class="mark-dot"></span><span>THEMEN.JP</span></a><span class="jp-corner" aria-hidden="true">音・流動</span></header>
    <section class="hero" id="top"><div class="hero-inner"><p class="eyebrow">Amsterdam · The Netherlands</p><h1>THEMEN</h1><p class="kana">テイメン</p><p class="descriptor">Liquid Drum &amp; Bass Producer</p><button class="listen-link" id="heroPlay" type="button" aria-label="Play Lost by THEMEN"><span class="play-symbol" aria-hidden="true">▶</span><span>Listen</span></button></div></section>
    <section class="player" aria-label="Music player"><button class="player-button" id="playButton" type="button" aria-label="Play track">▶</button><div><p class="track-name">Lost — THEMEN</p><div class="progress-wrap" id="progressWrap" aria-label="Audio progress"><div class="progress"><div class="progress-fill" id="progressFill"></div><div class="progress-knob" id="progressKnob"></div></div></div></div><span class="time" id="time">0:00 / 0:00</span>
      <nav class="socials" aria-label="Listen and follow"><a href="https://soundcloud.com/7hemen" target="_blank" rel="noopener">SoundCloud</a><a href="https://www.instagram.com/7hemen" target="_blank" rel="noopener">Instagram</a><a href="https://www.facebook.com/7hemen/" target="_blank" rel="noopener">Facebook</a><a href="https://open.spotify.com/artist/6Q6RHIrMk7mzyNaw2rysr1?si=14eeLq_iQdSFsX7g-Gp-8Q" target="_blank" rel="noopener">Spotify</a><a href="https://music.apple.com/us/artist/themen/1510528770" target="_blank" rel="noopener">Apple Music</a><a href="https://7hemen.bandcamp.com/" target="_blank" rel="noopener">Bandcamp</a><a href="mailto:joeri@themen.jp">Contact</a></nav>
      <audio id="audio" preload="metadata"><source src="THEMEN%20-%20Lost.wav" type="audio/wav"></audio>
    </section>
    <footer class="footer"><span>© <span id="year"></span> THEMEN</span><span class="stamp" aria-label="THEMEN seal">題<br>面</span><a href="mailto:joeri@themen.jp">joeri@themen.jp</a></footer>
  </main>
  <script>
    const root=document.documentElement,audio=document.getElementById('audio'),playButton=document.getElementById('playButton'),heroPlay=document.getElementById('heroPlay'),heroSymbol=heroPlay.querySelector('.play-symbol'),progressWrap=document.getElementById('progressWrap'),progressFill=document.getElementById('progressFill'),progressKnob=document.getElementById('progressKnob'),time=document.getElementById('time');document.getElementById('year').textContent=new Date().getFullYear();
    function formatTime(seconds){if(!Number.isFinite(seconds))return'0:00';const minutes=Math.floor(seconds/60),remaining=Math.floor(seconds%60).toString().padStart(2,'0');return`${minutes}:${remaining}`}
    function updateButton(){const symbol=audio.paused?'▶':'Ⅱ';playButton.textContent=symbol;heroSymbol.textContent=symbol;playButton.setAttribute('aria-label',audio.paused?'Play track':'Pause track')}
    async function toggleAudio(){try{audio.paused?await audio.play():audio.pause()}catch(error){console.warn('Upload THEMEN - Lost.wav to the repository root.',error)}updateButton()}
    playButton.addEventListener('click',toggleAudio);heroPlay.addEventListener('click',toggleAudio);audio.addEventListener('play',updateButton);audio.addEventListener('pause',updateButton);audio.addEventListener('ended',updateButton);audio.addEventListener('loadedmetadata',()=>{time.textContent=`0:00 / ${formatTime(audio.duration)}`});audio.addEventListener('timeupdate',()=>{const percentage=audio.duration?audio.currentTime/audio.duration*100:0;progressFill.style.width=`${percentage}%`;progressKnob.style.left=`${percentage}%`;time.textContent=`${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`});progressWrap.addEventListener('click',event=>{if(!audio.duration)return;const rect=progressWrap.getBoundingClientRect(),ratio=Math.min(1,Math.max(0,(event.clientX-rect.left)/rect.width));audio.currentTime=ratio*audio.duration});
    if(window.matchMedia('(pointer:fine)').matches&&!window.matchMedia('(prefers-reduced-motion: reduce)').matches){window.addEventListener('pointermove',event=>{root.style.setProperty('--mx',((event.clientX/window.innerWidth)-.5).toFixed(3));root.style.setProperty('--my',((event.clientY/window.innerHeight)-.5).toFixed(3))})}
  </script>
</body>
</html>
